EURUSD:
  contract_size: 100000
  min_lot: 0.01
  lot_step: 0.01
  pip_value_usd: 10.0     # per 1.0 standard lot
  cluster: "USD_MAJORS"
  typical_spread_pips: 0.6

GBPUSD:
  contract_size: 100000
  min_lot: 0.01
  lot_step: 0.01
  pip_value_usd: 10.0
