# MT5 Test Bot — runtime config
# Бүх critical хязгаарууд risk-д бичсэн. Strategy эдгээрийг override хийж чадахгүй.

transport:
  pub_url: "tcp://127.0.0.1:5555"   # gateway → brain (ticks/bars)
  rpc_url: "tcp://127.0.0.1:5556"   # brain → gateway (orders, RPC)
  hmac_secret_env: "MT5BOT_HMAC"    # env var name; .env-д тогт

mt5:
  symbols: ["EURUSD"]               # эхэндээ ганц symbol — validate болсны дараа expand
  timeframes: ["M1", "M5"]
  heartbeat_seconds: 5
  flatten_on_silence_seconds: 60    # brain дуугүй болсноос хойш бүгдийг хаах

risk:
  max_risk_per_trade: 0.005         # 0.5% acct
  max_daily_loss: 0.03              # 3% acct
  max_weekly_loss: 0.06
  max_open_positions: 3
  max_usd_net_exposure_lots: 2.0
  max_correlation_cluster_lots: 1.5
  news_blackout_minutes: 5
  min_seconds_between_orders: 2
  entry_far_from_market_pct: 0.005  # 0.5%
  require_stop_loss: true           # хэзээ ч false болгож болохгүй

journal:
  sqlite_path: "data/journal.sqlite"
  parquet_dir: "data/ticks"
  events_jsonl: "data/events.jsonl"

logging:
  level: "INFO"
  json: true
